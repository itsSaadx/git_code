<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if else</title>
</head>
<body>
    <script>
        console.log(5=="5");
        console.log(3==="3");
        console.log(3!=="3");
        console.log(3!="3");
        

        let age = 20;
        if(age>18){
            console.log("you can drive");
        }

        else{
            console.log("use bicycle");
        }

    </script>
</body>
</html>
